<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - BrahmaChaitanyaHanumanMandir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 4px 8px; border-radius: 4px; width: 80px; }
        .edit-only { display: none; }
        .editing .edit-only { display: table-cell; } /* Changed to table-cell for column alignment */
        .editing button.edit-only, .editing div.edit-only { display: inline-block; }
        .editing .view-only { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto" id="app">
        <!-- Contact Header Section -->
        <div class="text-center mb-8 border-b border-white/10 pb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-400 mb-2">Inventory List</h1>
            <p class="text-gray-400 text-sm md:text-base">Brahma Chaitanya Hanuman Mandir</p>
            <!--<p class="text-blue-300/80 font-medium mt-2">Contact: +91 98XXX XXXXX | +91 99XXX XXXXX</p>-->
            <div id="statusBadge" class="inline-block mt-4 px-3 py-1 rounded text-xs bg-gray-700 font-medium">View Only</div>
        </div>

        <div class="glass rounded-2xl overflow-hidden mb-8 shadow-xl">
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left min-w-[1000px]">
                    <thead class="bg-white/10 text-blue-300">
                        <tr>
                            <th class="p-3 md:p-4 text-sm md:text-base">Item Name</th>
                            <th class="p-3 md:p-4 text-sm md:text-base">Unit</th>
                            <th class="p-3 md:p-4 text-sm md:text-base">Required</th>
                            <th class="p-3 md:p-4 text-sm md:text-base">Received</th>
                            <!-- HIDDEN IN VIEW MODE -->
                            <th class="p-3 md:p-4 text-sm md:text-base edit-only">Received at Mandir</th>
                            <th class="p-3 md:p-4 text-sm md:text-base">Remaining</th>
                            <th class="p-3 md:p-4 text-sm md:text-base">Donators</th>
                            <!-- HIDDEN IN VIEW MODE -->
                            <th class="p-3 md:p-4 text-sm md:text-base edit-only">Donators Contact</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList">
                        <tr><td colspan="8" class="p-8 text-center text-gray-500">Loading shared data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
            <button id="manageBtn" onclick="enterManageMode()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-full font-bold transition-all shadow-lg active:scale-95">Manage</button>
            <button id="saveBtn" onclick="saveChanges()" class="edit-only hidden bg-green-600 hover:bg-green-500 px-10 py-3 rounded-full font-bold transition-all shadow-lg active:scale-95">Save All Changes</button>
            <button id="addBtn" onclick="addNewRow()" class="edit-only hidden bg-gray-700 hover:bg-gray-600 px-10 py-3 rounded-full font-bold shadow-lg">Add Item</button>
        </div>
    </div>

    <script>
        let inventory = [];
        let isEditing = false;
        let sessionPassword = "";

        async function load() {
            try {
                const res = await fetch('/api/inventory');
                inventory = await res.json();
                render();
            } catch (e) {
                document.getElementById('inventoryList').innerHTML = '<tr><td colspan="8" class="p-8 text-center text-red-400">Error loading data.</td></tr>';
            }
        }

        function render() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = inventory.map((item, index) => {
                const remaining = Math.max(0, item.total - item.received);
                const unitDisplay = item.unit || "-";
                
                return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                    <td class="p-3 md:p-4">
                        <span class="view-only text-sm md:text-base">${item.name}</span>
                        <input class="edit-only text-sm" style="width:140px" type="text" value="${item.name}" onchange="updateLocal(${index}, 'name', this.value)">
                    </td>
                    <td class="p-3 md:p-4">
                        <span class="view-only text-sm md:text-base text-gray-400">${unitDisplay}</span>
                        <input class="edit-only text-sm" style="width:70px" type="text" value="${item.unit || ''}" placeholder="Unit" onchange="updateLocal(${index}, 'unit', this.value)">
                    </td>
                    <td class="p-3 md:p-4">
                        <span class="view-only text-sm md:text-base">${item.total}</span>
                        <input class="edit-only text-sm" type="number" value="${item.total}" onchange="updateLocal(${index}, 'total', this.value)">
                    </td>
                    <td class="p-3 md:p-4">
                        <span class="view-only text-sm md:text-base">${item.received}</span>
                        <input class="edit-only text-sm" type="number" value="${item.received}" onchange="updateLocal(${index}, 'received', this.value)">
                    </td>
                    <td class="p-3 md:p-4 edit-only">
                        <input class="text-sm" style="width:100px" type="text" value="${item.receivedAtMandir || ''}" placeholder="Location/Date" onchange="updateLocal(${index}, 'receivedAtMandir', this.value)">
                    </td>
                    <td class="p-3 md:p-4 font-bold text-sm md:text-base ${remaining > 0 ? 'text-orange-400' : 'text-green-400'}">
                        ${remaining} <span class="text-[10px] uppercase opacity-60">${unitDisplay}</span>
                    </td>
                    <td class="p-3 md:p-4">
                        <span class="view-only text-xs italic text-blue-200/60">${item.donators || "None"}</span>
                        <input class="edit-only text-sm" style="width:180px" type="text" value="${item.donators || ''}" placeholder="Name - Qty" onchange="updateLocal(${index}, 'donators', this.value)">
                    </td>
                    <td class="p-3 md:p-4 edit-only">
                        <input class="text-sm" style="width:140px" type="text" value="${item.donatorsContact || ''}" placeholder="Phone Number" onchange="updateLocal(${index}, 'donatorsContact', this.value)">
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="8" class="p-8 text-center text-gray-500">No items found.</td></tr>';
        }

        function updateLocal(index, field, value) {
            const textFields = ['name', 'unit', 'donators', 'receivedAtMandir', 'donatorsContact'];
            if (textFields.includes(field)) {
                inventory[index][field] = value;
            } else {
                inventory[index][field] = parseInt(value) || 0;
            }
            render(); 
        }

        function addNewRow() {
            inventory.push({ name: "New Item", unit: "", total: 0, received: 0, receivedAtMandir: "", donators: "", donatorsContact: "" });
            render();
        }

        async function enterManageMode() {
            const pass = prompt("Enter Password to Manage:");
            if (!pass) return;

            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });

            if (res.ok) {
                sessionPassword = pass;
                isEditing = true;
                document.getElementById('app').classList.add('editing');
                document.getElementById('manageBtn').style.display = 'none';
                
                // Show hidden buttons
                document.getElementById('saveBtn').classList.remove('hidden');
                document.getElementById('addBtn').classList.remove('hidden');
                
                const badge = document.getElementById('statusBadge');
                badge.innerText = "Edit Mode";
                badge.className = "inline-block mt-4 px-3 py-1 rounded text-xs bg-orange-600 font-bold animate-pulse";
                render();
            } else {
                alert("Invalid Password. Access Denied.");
            }
        }

        async function saveChanges() {
            const res = await fetch('/api/inventory', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: sessionPassword, updatedList: inventory })
            });

            if(res.ok) {
                alert('Saved successfully!');
                location.reload(); 
            } else {
                alert('Invalid Credentials. Changes not saved.');
            }
        }
        load();
    </script>
</body>
</html>
