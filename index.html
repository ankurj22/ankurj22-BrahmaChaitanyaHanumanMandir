<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>BrahmaChaitanya Hanuman Mandir - Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">Shared Inventory</h1>
        <div id="list" class="space-y-4 mb-8">Loading shared data...</div>
        
        <div class="bg-slate-800 p-6 rounded-xl border border-white/10">
            <h2 class="text-xl mb-4">Update Item</h2>
            <div class="grid gap-3">
                <input id="pass" type="password" placeholder="Enter Creds" class="bg-slate-700 p-2 rounded">
                <input id="name" type="text" placeholder="Item Name" class="bg-slate-700 p-2 rounded">
                <input id="received" type="number" placeholder="Received Quantity" class="bg-slate-700 p-2 rounded">
                <button onclick="updateDB()" class="bg-blue-600 p-2 rounded font-bold">Update Shared List</button>
            </div>
        </div>
    </div>

    <script>
        let currentList = [];
        async function load() {
            const res = await fetch('/api/inventory');
            currentList = await res.json();
            render();
        }

        function render() {
            const container = document.getElementById('list');
            container.innerHTML = currentList.map(item => `
                <div class="flex justify-between border-b border-white/10 pb-2">
                    <span>${item.name}</span>
                    <span>Received: <b>${item.received}</b></span>
                </div>
            `).join('') || "No items yet.";
        }

        async function updateDB() {
            const password = document.getElementById('pass').value;
            const name = document.getElementById('name').value;
            const received = parseInt(document.getElementById('received').value);

            // Find item and update or add new
            const index = currentList.findIndex(i => i.name === name);
            if(index > -1) currentList[index].received = received;
            else currentList.push({name, received});

            const res = await fetch('/api/inventory', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password, updatedList: currentList })
            });

            if(res.ok) { alert('Updated for everyone!'); load(); }
            else { alert('Wrong credentials!'); }
        }
        load();
    </script>
</body>
</html>
