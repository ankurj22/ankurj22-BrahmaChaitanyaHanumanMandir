<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div class="glass p-10 rounded-3xl text-center shadow-2xl w-80">
        <h1 class="text-2xl font-bold mb-6 text-blue-400">FocusFlow</h1>
        <div id="timer" class="text-6xl font-mono mb-8">25:00</div>
        <div class="flex gap-4 justify-center">
            <button onclick="toggleTimer()" id="startBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full transition font-semibold">Start</button>
            <button onclick="resetTimer()" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-full transition font-semibold">Reset</button>
        </div>
    </div>

    <script>
        let timeLeft = 1500; let timerId = null;
        const display = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId); timerId = null;
                startBtn.innerText = 'Start';
            } else {
                startBtn.innerText = 'Pause';
                timerId = setInterval(() => {
                    timeLeft--; updateDisplay();
                    if (timeLeft === 0) { clearInterval(timerId); alert('Time is up!'); }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId); timerId = null;
            timeLeft = 1500; updateDisplay();
            startBtn.innerText = 'Start';
        }
    </script>
</body>
</html>
